<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FCE776">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23FCE776'/><text x='50' y='72' font-size='60' text-anchor='middle' font-family='sans-serif' font-weight='bold'>B</text></svg>">
  <title>Bandana Featured Card + Notion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface-2:#222;--border:#2a2a2a;--border-focus:#FCE776;--text:#e8e8e8;--text-dim:#888;--accent:#FCE776;--accent-hover:#fdd835;--danger:#ff6b6b;--success:#4ecdc4;--r:8px;--rl:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;position:sticky;top:0;z-index:100;gap:16px}
    .header-logo{width:32px;height:32px;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#000}
    .header h1{font-size:18px;font-weight:600;letter-spacing:-0.3px}
    .header h1 span{color:var(--accent)}
    .badge{font-size:10px;font-weight:700;background:var(--accent);color:#000;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}
    .badge.notion{background:#a3a3a3}

    .container{max-width:1200px;margin:0 auto;padding:32px;display:grid;grid-template-columns:1fr 500px;gap:32px}
    @media(max-width:1100px){.container{grid-template-columns:1fr}.preview-panel{position:static!important}}
    .input-panel{display:flex;flex-direction:column;gap:16px}
    .preview-panel{position:sticky;top:90px;align-self:start;display:flex;flex-direction:column;gap:16px}

    .section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:4px}
    .field-group{display:flex;flex-direction:column;gap:4px}
    .field-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}

    input{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border-color .2s,background .2s;width:100%}
    input:focus{border-color:var(--accent)}
    input::placeholder{color:#555}
    input.autofilled{border-color:rgba(78,205,196,.4);background:rgba(78,205,196,.05)}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;transition:border-color .2s}
    .card:focus-within{border-color:var(--border-focus)}
    .card h2{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .card h2 .num{font-size:12px;font-weight:700;background:var(--accent);color:#000;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center}

    .url-row{display:flex;gap:8px;margin-bottom:16px}
    .url-row input{flex:1}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .detail-grid .full-width{grid-column:1/-1}

    .id-verify{margin-bottom:12px;padding:8px 12px;border-radius:var(--r);font-size:11px;font-weight:500;display:none}
    .id-verify.match{display:block;background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.3);color:var(--success)}
    .id-verify.mismatch{display:block;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:var(--danger)}

    .status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .job-status{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--surface-2);color:var(--text-dim);transition:all .2s}
    .job-status.loaded{background:rgba(78,205,196,.15);color:var(--success)}
    .job-status.error{background:rgba(255,107,107,.15);color:var(--danger)}
    .job-status.fetching{background:rgba(252,231,118,.15);color:var(--accent)}
    .job-status.verified{background:rgba(78,205,196,.25);color:var(--success)}

    .logo-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px;background:var(--bg);border-radius:var(--r)}
    .logo-row img{width:36px;height:36px;border-radius:var(--r);background:#f0f0f0}
    .logo-row span{font-size:12px;color:var(--text-dim);word-break:break-all}

    .btn-fetch{background:var(--accent);color:#000;border:none;border-radius:var(--r);padding:10px 20px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
    .btn-fetch:hover{background:var(--accent-hover)}
    .btn-fetch:disabled{opacity:.4;cursor:not-allowed}

    .clear-btn{background:none;border:none;color:var(--danger);font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:4px;font-family:inherit}
    .clear-btn:hover{background:rgba(255,107,107,.1)}

    .action-buttons{display:flex;gap:10px}
    .btn-generate{flex:1;background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px 24px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
    .btn-generate:hover{background:var(--accent-hover);transform:translateY(-1px)}
    .btn-copy{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-copy:hover{border-color:var(--accent);color:var(--accent)}

    .preview-frame{background:#fff;border-radius:var(--rl);overflow:hidden;max-height:700px;overflow-y:auto}
    .preview-frame::-webkit-scrollbar{width:6px}
    .preview-frame::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

    .toast{position:fixed;bottom:32px;right:32px;background:var(--success);color:#000;padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;transform:translateY(100px);opacity:0;transition:all .3s ease;z-index:999}
    .toast.show{transform:translateY(0);opacity:1}

    .schema-raw{margin-top:8px;font-size:11px;color:var(--text-dim);background:var(--bg);padding:8px;border-radius:6px;max-height:80px;overflow-y:auto;display:none;font-family:monospace;word-break:break-all;white-space:pre-wrap}
    .schema-raw.visible{display:block}
    .toggle-raw{background:none;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;padding:4px 0;text-decoration:underline;margin-top:4px;font-family:inherit}

    /* Notion status */
    .notion-status{margin-top:12px;padding:10px 14px;border-radius:var(--r);font-size:12px;display:none;align-items:center;gap:8px}
    .notion-status.synced{display:flex;background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);color:var(--success)}
    .notion-status.syncing{display:flex;background:rgba(252,231,118,.08);border:1px solid rgba(252,231,118,.2);color:var(--accent)}
    .notion-status.failed{display:flex;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);color:var(--danger)}
    .notion-status a{color:inherit;text-decoration:underline}

    @media(max-width:600px){.container{padding:16px}.detail-grid{grid-template-columns:1fr}.detail-grid .full-width{grid-column:1}}
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">B</div>
  <h1>Bandana <span>Featured Card</span></h1>
  <span class="badge">Single Job · CTA Card</span>
  <span class="badge notion">+ Notion</span>
</header>

<main class="container">
  <section class="input-panel">
    <div class="card">
      <div class="field-group">
        <label class="field-label" for="greeting-name">Greeting Name (default)</label>
        <input type="text" id="greeting-name" value="Hey" placeholder="e.g. Hey">
      </div>
      <div class="field-group" style="margin-top:12px">
        <label class="field-label" for="greeting-line">Greeting Line</label>
        <input type="text" id="greeting-line" value="We found a new role based on your saved preferences:" placeholder="e.g. We found a new role for you:">
      </div>
    </div>

    <div class="card">
      <div class="status-bar">
        <h2><span class="num">1</span> Job Details</h2>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="job-status" id="status">Empty</span>
          <button class="clear-btn" id="btn-clear">Clear</button>
        </div>
      </div>
      <div class="url-row">
        <input type="text" id="url" placeholder="https://bandana.com/jobs/..." autofocus>
        <button class="btn-fetch" id="btn-fetch">Fetch</button>
      </div>
      <div class="id-verify" id="id-verify"></div>
      <div class="detail-grid">
        <div class="field-group full-width"><label class="field-label" for="title">Job Title</label><input type="text" id="title" placeholder="e.g. Community Engagement"></div>
        <div class="field-group"><label class="field-label" for="company">Company</label><input type="text" id="company" placeholder="e.g. Life360"></div>
        <div class="field-group"><label class="field-label" for="domain">Domain (logo)</label><input type="text" id="domain" placeholder="e.g. life360.com"></div>
        <div class="field-group"><label class="field-label" for="salary">Pay</label><input type="text" id="salary" placeholder="e.g. $25/hr"></div>
        <div class="field-group"><label class="field-label" for="location">Location</label><input type="text" id="location" placeholder="e.g. Remote"></div>
      </div>
      <div class="logo-row">
        <img id="logo-img" src="https://img.logo.dev/bandana.com?token=live_6a1a28fd-6420-4492-aeb0-b297461d9de2&size=128&retina=false&format=png&theme=dark" alt="">
        <span id="logo-url">Set company domain to load logo</span>
      </div>

      <!-- Notion sync status -->
      <div class="notion-status" id="notion-status"></div>

      <button class="toggle-raw" id="btn-toggle-raw">Show raw schema</button>
      <div class="schema-raw" id="schema-raw"></div>
    </div>
  </section>

  <aside class="preview-panel">
    <div class="section-label">Email Preview</div>
    <div class="preview-frame" id="preview-frame">
      <div style="padding:40px 20px;text-align:center;color:#aaa;font-size:14px;">Paste a URL → Fetch → auto-logs to Notion</div>
    </div>
    <div class="action-buttons">
      <button class="btn-generate" id="btn-generate">Generate Email</button>
      <button class="btn-copy" id="btn-copy">Copy HTML</button>
    </div>
  </aside>
</main>

<div class="toast" id="toast" role="alert"></div>

<script>
(() => {
  'use strict';

  const LOGO_TOKEN = 'live_6a1a28fd-6420-4492-aeb0-b297461d9de2';
  const NOTION_DS_ID = '8fcf5a01-97b8-496b-ac35-b5b6a264e31f';
  let generatedHTML = '';

  const PROXIES = [
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  const KNOWN_DOMAINS = {
    'mta':'mta.info','metropolitan transportation authority':'mta.info',
    'cvs':'cvs.com','cvs health':'cvs.com','walmart':'walmart.com','amazon':'amazon.com',
    'target':'target.com','costco':'costco.com','ups':'ups.com','fedex':'fedex.com',
    'usps':'usps.com','home depot':'homedepot.com','the home depot':'homedepot.com',
    'lowes':'lowes.com',"lowe's":'lowes.com','starbucks':'starbucks.com',
    'mcdonalds':'mcdonalds.com',"mcdonald's":'mcdonalds.com','chipotle':'chipotle.com',
    'patreon':'patreon.com','dropbox':'dropbox.com','ramp':'ramp.com',
    'squire':'getsquire.com','earnest':'earnest.com',
    'nyc health + hospitals':'nychealthandhospitals.org','city of new york':'nyc.gov',
    'nypd':'nyc.gov','dsny':'nyc.gov','state of new york':'ny.gov',
    'amtrak':'amtrak.com','con edison':'coned.com','conedison':'coned.com',
    'consolidated edison':'coned.com','united states courts':'uscourts.gov',
    'van leeuwen':'vanleeuwenicecream.com','life360':'life360.com',
    'google':'google.com','meta':'meta.com','apple':'apple.com','microsoft':'microsoft.com',
    'netflix':'netflix.com','jpmorgan chase':'jpmorganchase.com',
    'bank of america':'bankofamerica.com','wells fargo':'wellsfargo.com',
  };

  const $ = id => document.getElementById(id);
  function logoUrl(d) { return `https://img.logo.dev/${d||'bandana.com'}?token=${LOGO_TOKEN}&size=128&retina=false&format=png&theme=dark`; }
  function extractJobId(url) { const m = url.match(/\/jobs\/([a-f0-9-]{36})/i); return m ? m[1] : null; }
  function guessDomain(c) { const k = c.toLowerCase().trim(); return KNOWN_DOMAINS[k] || k.replace(/[^a-z0-9]/g,'') + '.com'; }
  function extractDomain(org) {
    if (!org) return '';
    for (const k of ['sameAs','url']) { if (org[k]) { try { return new URL(org[k].startsWith('http') ? org[k] : `https://${org[k]}`).hostname.replace(/^www\./,''); } catch(e){} } }
    return '';
  }

  function extractSchemas(html) {
    const schemas = [];
    const re = /<script[^>]*type\s*=\s*["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
    let m;
    while ((m = re.exec(html)) !== null) {
      try {
        const d = JSON.parse(m[1].trim());
        (Array.isArray(d) ? d : [d]).forEach(it => {
          if (it['@type'] === 'JobPosting') schemas.push(it);
          if (it['@graph']) it['@graph'].forEach(g => { if (g['@type'] === 'JobPosting') schemas.push(g); });
        });
      } catch(e) {}
    }
    return schemas;
  }

  function fmtSalary(bs) {
    if (!bs) return '';
    const v = bs.value; if (!v) return '';
    let amt = '', unit = '';
    if (typeof v === 'object') {
      const ut = (v.unitText||'').toUpperCase();
      unit = {HOUR:'/hr',YEAR:'/yr',MONTH:'/mo'}[ut]||'';
      if (v.minValue!=null && v.maxValue!=null) amt = `$${Number(v.minValue).toFixed(2)} - $${Number(v.maxValue).toFixed(2)}`;
      else if (v.value!=null) amt = `$${Number(v.value).toFixed(2)}`;
      else if (v.minValue!=null) amt = `$${Number(v.minValue).toFixed(2)}+`;
    } else if (typeof v === 'number') amt = `$${v.toFixed(2)}`;
    return amt ? `${amt}${unit}` : '';
  }

  function fmtLocation(jl) {
    if (!jl) return '';
    const loc = Array.isArray(jl) ? jl[0] : jl;
    if (!loc) return '';
    const a = loc.address;
    if (!a) return loc.name||'';
    if (typeof a === 'string') return a;
    return [a.addressLocality, a.addressRegion].filter(Boolean).join(', ');
  }

  async function fetchWithProxy(url) {
    for (const pf of PROXIES) {
      try { const r = await fetch(pf(url),{signal:AbortSignal.timeout(12000)}); if(r.ok){const t=await r.text();if(t.length>500)return t;} } catch(e){continue;}
    }
    throw new Error('All proxies failed');
  }

  function setField(f, v) { const el=$(f); el.value=v; el.classList.add('autofilled'); setTimeout(()=>el.classList.remove('autofilled'),3000); }
  function setStatus(t, c) { const el=$('status'); el.textContent=t; el.className='job-status'+(c?` ${c}`:''); }
  function showToast(msg) { const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500); }
  function updateLogoPreview() {
    const d=$('domain').value.trim();
    if(d){$('logo-img').src=logoUrl(d);$('logo-url').textContent=d;$('domain').dataset.manual='true';}
  }

  function setNotionStatus(state, msg) {
    const el = $('notion-status');
    el.className = 'notion-status ' + state;
    el.innerHTML = msg;
  }

  /* ===== PUSH TO NOTION ===== */
  async function pushToNotion(jobData) {
    setNotionStatus('syncing', '⏳ Syncing to Notion...');
    try {
      const today = new Date().toISOString().split('T')[0];
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `Create a page in the Notion data source with ID "${NOTION_DS_ID}" with these properties:
- Job Title: "${jobData.title}"
- Company: "${jobData.company}"
- Location: "${jobData.location}"
- Pay: "${jobData.salary}"
- Job URL: "${jobData.url}"
- Template: "Featured Card"
- Status: "Draft"
- Sent Date start: "${today}"
- Sent Date is_datetime: 0

Just create the page. Do not explain anything.`
          }],
          mcp_servers: [{
            type: 'url',
            url: 'https://mcp.notion.com/mcp',
            name: 'notion-mcp'
          }]
        })
      });

      if (!response.ok) throw new Error(`API ${response.status}`);
      const data = await response.json();

      // Check for page URL in response
      const textContent = data.content
        ?.filter(b => b.type === 'text')
        ?.map(b => b.text)
        ?.join(' ') || '';

      const toolResults = data.content
        ?.filter(b => b.type === 'mcp_tool_result')
        ?.map(b => b.content?.[0]?.text || '')
        ?.join(' ') || '';

      const allText = textContent + ' ' + toolResults;

      // Try to find a Notion URL
      const urlMatch = allText.match(/https:\/\/(?:www\.)?notion\.so\/[^\s"<>)]+/);
      if (urlMatch) {
        setNotionStatus('synced', `✅ Logged to Notion — <a href="${urlMatch[0]}" target="_blank">Open</a>`);
      } else {
        setNotionStatus('synced', '✅ Logged to Notion');
      }
      showToast('Saved to Notion');
    } catch(err) {
      console.error('Notion push failed:', err);
      setNotionStatus('failed', `❌ Notion sync failed — ${err.message}`);
    }
  }

  function clearAll() {
    ['url','title','company','domain','salary','location'].forEach(f=>{$(f).value='';$(f).classList.remove('autofilled');});
    $('logo-img').src=logoUrl('bandana.com');$('logo-url').textContent='Set company domain to load logo';
    $('id-verify').style.display='none';
    $('schema-raw').textContent='';$('schema-raw').classList.remove('visible');
    $('notion-status').className='notion-status';$('notion-status').innerHTML='';
    delete $('domain').dataset.manual;
    setStatus('Empty',''); generatedHTML='';
    $('preview-frame').innerHTML='<div style="padding:40px 20px;text-align:center;color:#aaa;font-size:14px;">Paste a URL → Fetch → auto-logs to Notion</div>';
  }

  async function fetchJob() {
    const urlInput=$('url').value.trim();
    if(!urlInput||!urlInput.includes('bandana.com/jobs/')){setStatus('Invalid URL','error');return;}
    const urlJobId=extractJobId(urlInput);
    if(!urlJobId){setStatus('No job ID','error');return;}

    const btn=$('btn-fetch');btn.disabled=true;btn.textContent='...';
    setStatus('Fetching...','fetching');
    $('id-verify').className='id-verify';$('id-verify').style.display='none';
    $('notion-status').className='notion-status';

    try {
      const html=await fetchWithProxy(urlInput);
      const schemas=extractSchemas(html);
      $('schema-raw').textContent=schemas.length?JSON.stringify(schemas[0],null,2):'No JobPosting schema found';

      let title='', company='', salary='', location='', domain='';

      if(!schemas.length){
        const tm=html.match(/<title[^>]*>(.*?)<\/title>/i);
        if(tm){
          const parts=tm[1].replace(/&amp;/g,'&').replace(/&#39;/g,"'").split(' - ');
          if(parts.length>=2){
            company=parts[0].replace(/\s*Jobs?\s*$/i,'').trim();
            title=(parts[1]||'').trim();
            if(parts.length>2) location=parts.slice(2).join(', ').trim();
            domain=guessDomain(company);
            setField('company',company); setField('title',title);
            if(location) setField('location',location);
            $('domain').value=domain; updateLogoPreview();
          }
        }
        setStatus('No schema — title fallback','loaded');
      } else {
        const s=schemas[0];
        let sid='';
        if(s.identifier)sid=typeof s.identifier==='string'?s.identifier:(s.identifier.value||'');
        if(!sid)sid=s['@id']||s.url||'';
        const sUrl=s.url||s['@id']||'';
        let ok=false;
        const vEl=$('id-verify');
        if(String(sid).includes(urlJobId)||sUrl.includes(urlJobId)){
          ok=true;vEl.className='id-verify match';
          vEl.innerHTML=`✅ <strong>ID Verified</strong> — <code style="font-size:10px;background:rgba(78,205,196,.15);padding:2px 6px;border-radius:3px">${urlJobId}</code>`;
        } else if(sid||sUrl){
          vEl.className='id-verify mismatch'; vEl.innerHTML=`⚠️ <strong>Check ID</strong>`;
        } else {
          ok=true;vEl.className='id-verify match';vEl.innerHTML=`✅ <strong>Data loaded</strong>`;
        }
        vEl.style.display='block';

        title=s.title||s.name||'';
        const org=s.hiringOrganization||{};
        company=org.name||'';
        salary=fmtSalary(s.baseSalary);
        location=fmtLocation(s.jobLocation);
        domain=extractDomain(org)||guessDomain(company);

        if(title)setField('title',title);
        if(company)setField('company',company);
        if(salary)setField('salary',salary);
        if(location)setField('location',location);
        if(domain){$('domain').value=domain;$('domain').classList.add('autofilled');updateLogoPreview();}

        setStatus(ok?'Verified ✓':'Loaded (check ID)',ok?'verified':'loaded');
      }

      // Push to Notion (fire and forget — don't block UI)
      const jobData = {
        title: $('title').value.trim() || title,
        company: $('company').value.trim() || company,
        location: $('location').value.trim() || location,
        salary: $('salary').value.trim() || salary,
        url: urlInput
      };
      if (jobData.title || jobData.company) {
        pushToNotion(jobData); // async, no await — runs in background
      }

    } catch(err){
      console.error(err);setStatus('Fetch failed','error');
    }
    btn.disabled=false;btn.textContent='Fetch';
  }

  /* ===== GENERATE EMAIL ===== */

  function copyHTML(){
    if(!generatedHTML)generateEmail();
    if(!generatedHTML)return;
    navigator.clipboard.writeText(generatedHTML).then(()=>showToast('HTML copied!')).catch(()=>{
      const t=document.createElement('textarea');t.value=generatedHTML;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('Copied!');
    });
  }

  /* Events */
  $('btn-fetch').addEventListener('click', fetchJob);
  $('btn-clear').addEventListener('click', clearAll);
  $('btn-generate').addEventListener('click', generateEmail);
  $('btn-copy').addEventListener('click', copyHTML);
  $('btn-toggle-raw').addEventListener('click', () => $('schema-raw').classList.toggle('visible'));
  $('url').addEventListener('keydown', e => { if(e.key==='Enter') fetchJob(); });
  $('company').addEventListener('input', () => {
    const c=$('company').value.trim();const d=$('domain');
    if(c&&!d.dataset.manual){d.value=guessDomain(c);updateLogoPreview();}
  });
  $('domain').addEventListener('input', updateLogoPreview);
})();
